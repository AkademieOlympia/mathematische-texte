8. Was (noch) nicht „durch“ ist – und warum das okay ist

Ein ehrlicher Spektrum-Artikel muss auch sagen, wo die Grenze liegt:

Wu–Yang / Monopol-Verbindung

Für die Haldane-Sphäre ist eine Monopol-Verbindung (Wu–Yang-Patches) der natürliche Kandidat, weil sie die Symmetrie des Problems viel besser respektiert als „irgendeine“ numerische Lösung der Face-Flux-Constraints.

Wir haben dafür Codepfade vorbereitet, aber in dieser Umgebung gab es harte Laufzeitlimits, die größere Spektralrechnungen (hohes k, feines Mesh) erschwert haben. Das ist kein theoretisches Problem, sondern ein praktisches: so etwas muss man entweder effizienter machen oder lokal mit mehr Ressourcen laufen lassen.

Wichtig: Das ändert nichts an der Kernerkenntnis der heutigen Session:
Wir wissen jetzt sehr klar, welche Voraussetzung für Haldane nötig ist (Symmetrie/Gauge) – und wir haben die Diagnostik gebaut, um es dann sauber zu bestätigen.

⸻

9. Warum diese „banale“ Mesh-Signatur im BM-Kontext so stark ist

Es wirkt fast zu simpel: Valenzhistogramm, Defektzahl, Uniformity. Aber genau solche Größen machen aus einem Modell eine Wissenschaftsmaschine, weil sie dir erlauben, Fragen zu stellen wie:
	•	Verändert Morley-Twist das Spektrum im Bulk anders als an Defekten?
	•	Sind Chern-Marker stabiler auf Level-3-Meshes als auf Level-1-Meshes?
	•	Ab welcher Uniformity beginnen Haldane-Cluster überhaupt „sichtbar“ zu werden?
	•	Kann man Dualität als Invarianztest verwenden (Mesh↔Dualmesh)?

Und hier taucht plötzlich wieder die Einstein-Ästhetik auf: Nicht „komplizierte Rechnungen“ sind das Ziel, sondern eine Struktur, die Fragen so stellt, dass die Antworten zwingend werden.

⸻

10. Ausblick: Der nächste logische Schritt (fast schon zwingend)

Wenn man die heutige Session als „Kapitel 1“ sieht, dann ist „Kapitel 2“ ziemlich klar:

(1) Mesh-Sweep: Level 0/1/2/3 als kontrollierte Achse

Für jeden Level:
	•	identische Physikparameter (flux, theta, channel aus)
	•	Haldane-Test + Spektrum + ggf. Marker
	•	dann Korrelation haldane_score vs uniformity_score

Das ist die Stelle, wo die eben erzeugten Korrelations-Tools wirklich „anfangen zu singen“.

(2) Monopol-Verbindung stabilisieren
	•	Wu–Yang-Phasen sauber implementieren,
	•	optional: per-edge Integrale verbessern,
	•	dann Degeneracies überprüfen.

(3) Morley/Walter als Störung hinzufügen

Erst wenn der Grundtest sitzt:
	•	Morley-Twist einschalten,
	•	Walter-Zehntel-Refinement als strukturierter Eingriff,
	•	sehen, wie robust topologische Marker bleiben.

(4) Dualität als Operator-Test
	•	gleiche Experimente auf dualer Struktur,
	•	prüfen, welche Größen invariant sein sollen.

