7. Die Voraussetzungen der heutigen Sektion (was musste gegeben sein, damit das funktioniert?)

Man kann die Voraussetzungen in drei Gruppen bündeln: Geometrie, Modellparameter, Rechenhygiene.

A) Geometrische Voraussetzungen
	1.	Explizite Mesh-Repräsentation: Vertices/Faces in JSON, wiederverwendbar.
Dazu liegen u.a. vor:
	•	icosahedron_level0_mesh.json￼
	•	icosahedron_level1_mesh.json￼
	•	icosahedron_level2_mesh.json￼
	•	icosahedron_level3_mesh.json￼
	2.	Verfeinerungslogik: Die Refinements müssen konsistent sein, sonst sind Signaturen unzuverlässig.
	3.	Dualitätsbewusstsein: Ikosaeder/Dodekaeder ist nicht nur „anders“, sondern eine definierte Transformation, die später operatorisch gebraucht wird.

B) Modell-/Parameter-Voraussetzungen
	1.	AlfaFit/PlanckFit-Radii: Zwei Arten von „Skalierungsanker“
	•	AlfaFit: Radius aus (normierter) Feinstrukturkonstante und elektronischer Compton-Skala
	•	PlanckFit: Radius in Planck-Länge
	2.	Flux-Definition als rationales Paar (p,q) → N_\phi=p/q.
	3.	Morley/Walter-Parameter als optionale „Twists“, die aber beim Grundtest ausgeschaltet bleiben sollten (sonst Symmetriebruch).

C) Rechenhygiene und Serialisierung
	1.	State-Ordner pro Kugel: damit man nicht ständig alles neu rechnet.
	2.	CSV/JSON-Ausgaben: reproduzierbar, diff-fähig, versionierbar.
	3.	Diagnostik vor Interpretation: Erst Mesh-Signatur, dann Spektrum, dann Topologie, dann Deutung.

