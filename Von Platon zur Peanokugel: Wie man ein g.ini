Von Platon zur Peanokugel: Wie man ein geometrisches Gedankenexperiment in eine numerische Physik-Testbank gießt

(eine Spektrum-der-Wissenschaft-Anmutung über Ziele, Ergebnisse und Voraussetzungen unserer heutigen BM-Session)

Es beginnt wie bei Einstein: nicht mit einem Messgerät, sondern mit einem Bild im Kopf. Zwei Körper, die sich anschauen wie Spiegelbilder: der Ikosaeder und sein dualer Gegenpart, der Dodekaeder. Beide sind Platonische Körper, beide hochsymmetrisch, beide seit Jahrhunderten Projektionsflächen für Ideen über Raum, Ordnung und – in moderner Sprache – Diskretisierung.

In unserem Fall ging es aber nicht um “schöne Geometrie” als Selbstzweck, sondern um eine methodische Frage: Wie lässt sich ein rekursiver Faltungs- und Verfeinerungsprozess so beschreiben, dass er am Ende als „Kugel“ (als diskrete Sphäre) numerisch greifbar wird – und zwar so greifbar, dass darauf spektrale, topologische und „quantenmechanische“ Tests laufen können?

Das ist eine typische Brücke zwischen Mathematik und Physik: Aus einem Gedankenexperiment muss eine robuste Rechenstruktur werden. Und genau diese Brücke haben wir heute ein großes Stück weit gebaut – inklusive Zwischenbilanz, Diagnostik und einem klaren Fahrplan, wie es weitergeht.

⸻

1. Die Ausgangsidee: Falten, Dualität, Rekursion – bis die Kugel „voll“ ist

Der gedankliche Kern war ein Prozess in zwei Richtungen:
	1.	Nach außen biegen: Aus jedem Dreiecksface des Ikosaeders wird durch „nach oben biegen“ ein lokaler Aufbau, der – in idealisierter Form – wieder in Richtung eines größeren Ikosaeders tendiert.
	2.	Nach innen biegen: Das gleiche, nur „nach innen“, was in der Intuition eine andere Art von Verdichtung oder Inversion erzeugt.

Der Clou ist die Rekursion: Man wiederholt diesen Schritt, bis die diskrete Struktur die Kugeloberfläche so fein abtastet, dass sie als numerischer Ersatz einer Sphäre taugt. Dasselbe macht man im Dualen: also analog auf dem Dodekaeder (oder genauer: auf Strukturen, die sich aus dem dualen Körper ableiten).

Schon hier taucht eine der BM-typischen Leitfragen auf:

Kann man aus einem solchen Dualprozess eine mathematisch sauber definierte Kopplung bauen?
Nicht als Metapher, sondern als Operator, als Abbildung, als Strukturgleichheit zwischen zwei Diskretisierungen derselben „idealen“ Kugel.

⸻

2. Morley- und Walter-Struktur als innerer Taktgeber

Früh in der Diskussion stand außerdem die Frage: Wann „greifen“ Morley- und Walter-Strukturen?
	•	Morley-Dreiecke (klassisch: das gleichseitige Dreieck aus den Trisektoren eines beliebigen Dreiecks) liefern bei dir eine Art universellen geometrischen „Resonanzkern“ – weil sie aus Winkel-Operationen hervorgehen und deshalb sehr gut zu „Phasen“ und „Rotationen“ passen.
	•	Walter-Dreiecke (bei dir mit „Zehntelgröße“ assoziiert) sind eine zweite, komplementäre Operation: sie erzeugen skalierte Flächen-/Teilungsrelationen, die sich in eine Diskretisierung hineinprägen lassen.

Die BM-Idee dahinter lässt sich so zusammenfassen:
Morley liefert eine phasenartige/rotationsartige Struktur, Walter eine skalierungsartige/teilungsartige Struktur. Zusammen können sie als zwei Achsen dienen, um auf einem triangulierten Körper nicht nur Geometrie zu haben, sondern eine regelbasierte Dynamik.

⸻

3. Die große Wende: „Schöne Geometrie“ reicht nicht – wir brauchen eine Testbank

Aus der reinen Konstruktion folgt die numerische Frage:

Wenn wir behaupten, unser diskretes Sphärenmodell trägt etwas wie „Quanten-Hall-Physik“ oder „Haldane-Sphäre“ als Analogie – wie prüfen wir das?

Hier sind wir heute sehr konkret geworden: Wir haben nicht nur „eine Idee“ formuliert, sondern eine prüfbare Pipeline aufgebaut. Der Ansatz war:
	1.	Diskrete Sphäre als Mesh (Vertices/Faces/Edges).
	2.	Diskrete Differentialgeometrie (DEC-Ideen): Operatoren auf dem Mesh, die sich wie Laplace-Operatoren, Hodge-Sterne etc. verhalten.
	3.	Magnetische Kopplung über Link-Phasen: Phasen auf Kanten, die einem effektiven Vektorpotential entsprechen.
	4.	Spektraltests: Eigenwerte (und ggf. Eigenvektoren) eines „magnetischen Laplacians“.
	5.	Topologische Tests: Chern-Marker / projektorbasierte Marker (in deinem Setup als numerische Diagnose gedacht).
	6.	Haldane-Test: Degeneracies auf der Sphäre mit Monopolfluss.

Damit ist der Übergang geschafft: Das Gedankenexperiment ist jetzt nicht mehr nur „bildlich“, sondern eine spezifizierte Rechenmaschine, die am Ende Dateien ausspuckt.

⸻

4. Ein Schlüsselproblem: Symmetrie ist keine Zierde, sondern Messbedingung

Gerade beim Haldane-Thema zeigt sich eine harte Lektion aus numerischer Physik:

Topologische/degenerierte Strukturen sind extrem empfindlich auf Symmetriebruch durch Diskretisierung.

Die Haldane-Sphäre hat eine berühmte Signatur: die Landau-Level-Degeneracies für Gesamtfluss N_\phi (Fluxquanten) lauten

g_n = N_\phi + 2n + 1 \quad (n=0,1,2,\dots)

Bei deinem Beispiel flux=(6,2) ist N_\phi = 3. Erwartet wäre dann:

4,6,8,10,12,14,\dots

Das ist eine knallharte, einfache Sequenz. Und genau deshalb ist sie so wertvoll: Sie taugt als „Ja/Nein-Stempel“, ob die Diskretisierung die richtigen Symmetrien trägt.

Was wir heute gesehen haben

Die erste Version der Link-Phasen (über „face_flux“-Constraints) liefert keine sichtbaren Degeneracies: die Clustergrößen sind effektiv 1. Das ist nicht „falsch“, sondern sagt: die Methode bricht Symmetrien und splittet Entartungen.

Und damit wird klar: Wenn wir Haldane ernsthaft prüfen wollen, brauchen wir:
	•	möglichst uniforme Sphärendiskretisierung,
	•	möglichst symmetrische Gauge-/Verbindungsdefinition (Monopol-Verbindung),
	•	möglichst wenig „Disorder“ (kein Random face_channel, kein zusätzlicher Twist, solange man die Grundsignatur testet).

⸻

5. Das eigentliche Highlight heute: Wir haben der Diskretisierung eine „Sprache“ gegeben (Mesh-Signatur)

Hier kam der Schläfli-Gedanke ins Spiel, aber nicht als historisches Ornament, sondern als ganz praktisches Instrument.

Schläfli-Symbolik (und verwandte Nachbarschaftsbeschreibungen) beantwortet die Frage:
	•	Welche Faces liegen vor? (p)
	•	Wie viele treffen sich typischerweise an einer Ecke? (q)
	•	Wie uniform ist die Struktur?

In einer triangulierten Sphäre (Ikosaeder-Refinement) ist das Besondere:
	•	Die Faces sind Dreiecke (p=3),
	•	im Bulk dominiert eine hexagonale Nachbarschaft (q=6),
	•	aber topologisch erzwungen existieren immer 12 fünfvalente Defekte (q=5).

Das ist der diskrete Schatten der Krümmung: eine klassische Erkenntnis, die in moderner Numerik als „Defektstruktur“ auftaucht.

Was wir daraus gemacht haben

Wir haben eine Mesh-Signatur berechnet und als Metadaten abgespeichert, so dass jeder Run (Haldane/QHE/whatever) später nicht nur Zahlen hat, sondern auch eine strukturelle Charakterisierung.

Für das Level-2-Mesh (das in den Testkugeln verwendet wurde) lautet die Signatur u.a.:
	•	n_V = 162, n_E = 480, n_F = 320, Euler \chi = 2
	•	Valenz-Histogramm: {5: 12, 6: 150}
	•	Valence-Mode: 6
	•	Defekte: 12
	•	Uniformity-Score (heuristisch): ≈ 0.885

Das ist für BM Gold wert, weil du damit später sagen kannst:

„Dieser Run ist auf einem (3,6)-Bulk-Mesh mit 12 Defekten gelaufen, Uniformity 0.885 – und genau dort hat sich das Spektrum so und so verhalten.“

Das ist Wissenschaft in der Praxis: Man instrumentiert die Bedingungen, nicht nur die Ergebnisse.

