name: EABC Python Tests

on:
  push:
    paths:
      - "eabc_from_lean.py"
      - "tests/test_eabc_from_lean.py"
      - ".github/workflows/eabc-python-tests.yml"
  pull_request:
    paths:
      - "eabc_from_lean.py"
      - "tests/test_eabc_from_lean.py"
      - ".github/workflows/eabc-python-tests.yml"
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lint tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff black

      - name: Run ruff
        run: ruff check eabc_from_lean.py tests/test_eabc_from_lean.py

      - name: Run black check
        run: black --check eabc_from_lean.py tests/test_eabc_from_lean.py

  test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest

      - name: Run EABC tests
        run: pytest tests/test_eabc_from_lean.py -q
